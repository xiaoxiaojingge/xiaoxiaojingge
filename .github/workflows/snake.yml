name: GitHub Snk Readme Workflow

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 1. 检出代码仓库
        uses: actions/checkout@v4

      - name: 2. 生成 GitHub 贡献贪吃蛇动画
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            github-snake.svg
            github-snake-dark.svg?palette=github-dark

      - name: 3. 移动文件到 assets 目录
        run: |
          mkdir -p assets
          mv github-snake.svg assets/
          mv github-snake-dark.svg assets/

      - name: 4. 提交并推送到 main 分支
        uses: EndBug/add-and-commit@v9
        with:
          add: assets/github-snake.svg assets/github-snake-dark.svg
          message: "更新贪吃蛇动画数据 [skip ci]"
          push: true
          default_author: github_actions